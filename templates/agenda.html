<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Médica - Consultas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tabulator.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/agenda.css') }}">
</head>
<body>

    <div class="container">

        <header class="cabecalho">
            <div class="usuario-info">
                <h1>Agenda Médica</h1>
                <p>Consultas e Agendamentos</p>
            </div>
            <a href="{{ url_for('logout') }}" class="btn-sair">Sair da Conta</a>
        </header>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alerta" role="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <section class="campo-busca">
            <input 
                type="text" 
                id="filtro-input" 
                placeholder="Pesquisar por paciente, CPF ou médico..." 
                autocomplete="off">
        </section>

        <main>
            <div id="tabela-agendamentos"></div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/tabulator.min.js') }}"></script>


    <script>
        var dadosAgenda = {{ agendamentos_json | safe }};

        var tabela = new Tabulator("#tabela-agendamentos", {
            data: dadosAgenda,
            layout: "fitColumns",
            placeholder: "Nenhum agendamento encontrado.",
            columns: [
                {title: "Data", field: "data", width: 110},
                {title: "Horário", field: "horario", width: 100},
                {title: "Paciente", field: "paciente"},
                {title: "CPF", field: "cpf"},
                {title: "Médico", field: "medico"},
                {title: "Especialidade", field: "especialidade"},
                {title: "Convênio", field: "convenio"},
                {title: "Status", field: "status", width: 120}
            ]
        });

        document.getElementById("filtro-input").addEventListener("keyup", function(e){
            var termoBusca = e.target.value.toLowerCase();
            tabela.setFilter(function(linha){
                return (linha.paciente && linha.paciente.toLowerCase().includes(termoBusca)) ||
                       (linha.cpf && linha.cpf.toLowerCase().includes(termoBusca)) ||
                       (linha.medico && linha.medico.toLowerCase().includes(termoBusca));
            });
        });
    </script>
</body>
</html>
